name: Remove asys.ps1 if included in a Push

on:
  push:
    branches:
      - '**'

jobs:
  check-and-delete-file:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Check if asys.ps1 exists
      id: check_existence
      run: |
        if [ -f "asys.ps1" ]; then
          echo "asys_exists=true" >> $GITHUB_OUTPUT
        else
          echo "asys_exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Delete asys.ps1 if it exists
      if: steps.check_existence.outputs.asys_exists == 'true'
      run: |
        git config --global user.email "asys-action@noreply.github.com"
        git config --global user.name "asys-action"
        git rm asys.ps1
        git commit -m "Delete asys.ps1 as it is not allowed"
        git push origin HEAD:${{ github.ref }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
